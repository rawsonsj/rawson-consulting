<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" width="240" height="220">
  <title>Rawson Consulting Logo</title>
  <desc>Rawson Consulting ICS/OT Cybersecurity — shield mark stacked lockup</desc>

  <!-- Shield body -->
  <path d="M120 12 L176 32 L176 90 Q176 128 120 148 Q64 128 64 90 L64 32 Z" fill="#042C53"/>

  <!-- Inner border -->
  <path d="M120 20 L168 38 L168 90 Q168 123 120 140 Q72 123 72 90 L72 38 Z"
        fill="none" stroke="#378ADD" stroke-width="0.9" opacity="0.55"/>

  <!-- Horizontal rule inside shield -->
  <line x1="80" y1="64" x2="160" y2="64" stroke="#185FA5" stroke-width="0.7" opacity="0.7"/>

  <!-- Lock shackle -->
  <path d="M107 44 Q107 30 120 30 Q133 30 133 44"
        fill="none" stroke="#85B7EB" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Lock body -->
  <rect x="103" y="43" width="34" height="21" rx="4.5" fill="#185FA5" stroke="#B5D4F4" stroke-width="1.2"/>
  <!-- Lock keyhole -->
  <circle cx="120" cy="53.5" r="4.5" fill="#E6F1FB"/>
  <line x1="120" y1="55" x2="120" y2="62" stroke="#B5D4F4" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Circuit tree — root node -->
  <circle cx="120" cy="88" r="6" fill="#B5D4F4"/>

  <!-- Primary branches -->
  <line x1="120" y1="88" x2="96" y2="107" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="88" x2="144" y2="107" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>

  <!-- Secondary branches left -->
  <line x1="96" y1="107" x2="84" y2="122" stroke="#378ADD" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="96" y1="107" x2="108" y2="122" stroke="#378ADD" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Secondary branches right -->
  <line x1="144" y1="107" x2="132" y2="122" stroke="#378ADD" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="144" y1="107" x2="156" y2="122" stroke="#378ADD" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Mid nodes -->
  <circle cx="96" cy="107" r="4.5" fill="#378ADD"/>
  <circle cx="144" cy="107" r="4.5" fill="#378ADD"/>

  <!-- Leaf nodes -->
  <circle cx="84" cy="122" r="3.5" fill="#185FA5"/>
  <circle cx="108" cy="122" r="3.5" fill="#185FA5"/>
  <circle cx="132" cy="122" r="3.5" fill="#185FA5"/>
  <circle cx="156" cy="122" r="3.5" fill="#185FA5"/>

  <!-- Wordmark -->
  <text x="120" y="172"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="600" letter-spacing="5"
        text-anchor="middle" fill="#042C53">RAWSON</text>

  <text x="120" y="188"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10" font-weight="400" letter-spacing="7"
        text-anchor="middle" fill="#444441">CONSULTING</text>

  <!-- Accent rule -->
  <line x1="72" y1="196" x2="168" y2="196" stroke="#D3D1C7" stroke-width="0.6"/>
  <line x1="104" y1="196" x2="136" y2="196" stroke="#378ADD" stroke-width="1.8"/>

  <!-- Tagline -->
  <text x="120" y="210"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="7.5" font-weight="400" letter-spacing="2.5"
        text-anchor="middle" fill="#378ADD">ICS / OT CYBERSECURITY</text>
</svg>
